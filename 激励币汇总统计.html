<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>激励币汇总统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --mars-green: #009E60;
            --mars-green-dark: #007A4A;
            --mars-green-light: #E6F7F0;
            --mars-green-lighter: #F3FBF7;
            --text-dark: #1A3A2A;
            --text-muted: #5A7A6A;
            --shadow: 0 8px 24px rgba(0,158,96,0.12);
            --shadow-hover: 0 12px 32px rgba(0,158,96,0.2);
        }
        
        body { 
            background: white;
            padding: 16px; 
            font-size: 18px; 
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            margin: 0;
        }
        
        /* 成功弹窗样式 */
        #success-alert {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--mars-green) 0%, var(--mars-green-dark) 100%);
            color: white;
            padding: 20px 36px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,158,96,0.4);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1060;
            font-weight: 700;
            font-size: 20px;
            backdrop-filter: blur(8px);
            min-width: 200px;
            text-align: center;
        }
        
        
        /* 员工卡片样式 - 固定尺寸 */
        .employee-card { 
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            height: 120px;
            width: calc(50% - 8px);
            min-width: 140px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .employee-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--mars-green);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .employee-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--mars-green);
        }
        
        .employee-card:hover::before {
            opacity: 1;
        }
        
        .employee-name {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }
        

        
        .employee-data {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .data-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .data-label {
            font-weight: 600;
            color: var(--mars-green);
        }
        
        /* 按钮样式优化 - 固定尺寸 */
        .btn-mars {
            background: linear-gradient(135deg, var(--mars-green) 0%, var(--mars-green-dark) 100%);
            border: none;
            color: white;
            font-size: 16px;
            padding: 12px 20px;
            font-weight: 600;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .btn-mars::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.5s;
        }
        
        .btn-mars:hover::before {
            left: 100%;
        }
        
        .btn-mars:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            color: white;
        }
        
        .btn-outline-mars {
            border: 2px solid var(--mars-green);
            color: var(--mars-green);
            background: white;
            font-size: 16px;
            padding: 12px 20px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }
        
        .btn-outline-mars:hover {
            background: var(--mars-green);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        
        .summary-box { 
            position: relative;
            border: 2px solid var(--mars-green);
            padding: 24px;
            border-radius: 16px;
            background: white;
            margin-top: 20px;
            box-shadow: var(--shadow-hover);
            width: 100%;
            max-width: 375px;
            margin: 20px auto 0;
        }
        
        .rank-text {
            font-size: 19px;
            font-weight: 700;
            color: var(--mars-green);
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1.2;
        }
        
        .praise-text {
            color: var(--mars-green);
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 0;
            line-height: 1.2;
        }
        
        .praise-text::before {
            content: "👏";
        }
        
        .problem-text {
            color: #D63031;
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 0;
            line-height: 1.2;
        }
        
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 340px;
            margin: 10vh auto;
        }
        
        .modal-header {
            background: linear-gradient(135deg, var(--mars-green) 0%, var(--mars-green-dark) 100%);
            color: white;
            border-radius: 20px 20px 0 0;
            padding: 16px 20px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .form-label {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .form-control, .form-check-input {
            font-size: 15px;
            padding: 10px 14px;
            border: 2px solid #E0EDE6;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-check-input:focus {
            border-color: var(--mars-green);
            box-shadow: 0 0 0 0.25rem rgba(0,158,96,0.15);
        }
        
        .btn-close {
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }
        
        .btn-close:hover {
            opacity: 1;
        }
        
        .copy-btn {
            margin-top: 20px;
            width: 100%;
            font-size: 17px;
            padding: 14px;
            font-weight: 700;
        }
        
        .coin-btn {
            border: 2px solid var(--mars-green);
            color: var(--mars-green);
            background: white;
            font-size: 16px;
            padding: 12px;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }
        
        .coin-btn:hover, .coin-btn.active {
            background: var(--mars-green);
            color: white;
            transform: scale(1.02);
            box-shadow: var(--shadow-hover);
        }
        
        .rest-day {
            color: var(--text-muted);
            font-style: italic;
            font-weight: 500;
        }
        
        .month-total-box {
            background: var(--mars-green-lighter);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--mars-green-light);
            box-shadow: var(--shadow);
        }
        
        .month-total-box label {
            color: var(--text-dark);
            font-weight: 700;
        }
        
        .month-total-box input {
            border-color: var(--mars-green);
            font-weight: 700;
            color: var(--mars-green);
        }
        
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--mars-green-light), transparent);
            margin: 20px 0;
        }
        
        
        /* 功能按钮栏优化 - 固定尺寸，适配屏幕 */
        .btn-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 8px;
        }
        
        .btn-bar .btn {
            flex: 0 0 45%;
            max-width: 160px;
            min-width: 140px;
            height: 42px;
            padding: 8px 10px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-shrink: 0;
        }
        
        @media (max-width: 320px) {
            .btn-bar .btn {
                flex: 0 0 90%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<!-- 主内容框 - 固定宽度，适配屏幕 -->
<div class="main-content" style="padding: 16px; background: white; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--mars-green-light); width: 100%; max-width: 375px; margin: 0 auto;">
    <!-- 门店名称与标题 -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 8px;">
        <span style="color: var(--mars-green); font-weight: 800; font-size: 26px;">门店</span>
        <input type="text" id="store-name-input" placeholder="请输入门店名称" style="width: 100px; padding: 8px 12px; border: 2px solid var(--mars-green); border-radius: 12px; font-size: 16px; font-weight: 700; color: var(--mars-green); background: white; box-shadow: 0 4px 12px rgba(0,158,96,0.15); text-align: center;">
    </div>
    <style>
        /* 美化输入框 */
        #store-name-input {
            transition: all 0.3s ease;
            cursor: text;
            width: 100px !important;
            text-align: center !important;
        }
        #store-name-input:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,158,96,0.2);
        }
        #store-name-input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(0,158,96,0.2);
        }
        #store-name-input::placeholder {
            color: var(--mars-green-light);
            font-weight: 600;
            text-align: center;
        }
    </style>
    <div style="text-align: center; margin-bottom: 12px;">
        <span style="color: var(--mars-green); font-weight: 800; font-size: 18px; letter-spacing: 1px;">激励币汇总统计</span>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; margin-bottom: 16px; background: white; padding: 8px 10px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--mars-green-light); margin: 0 8px 16px;">
        <span class="date-text" id="current-date" style="color: var(--text-muted); font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;"></span>
        <span class="half-month-text" id="half-month-display" style="color: var(--mars-green); font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 0 0 auto;"></span>
    </div>
    <style>
        /* 响应式日期显示 */
        @media (min-width: 375px) {
            .date-text {
                max-width: none !important;
                overflow: visible !important;
                text-overflow: clip !important;
            }
        }
    </style>
    <!-- 功能按钮栏 - 固定尺寸按钮，适配屏幕 -->
    <div class="btn-bar">
        <button class="btn btn-outline-mars" id="department-btn" onclick="openDepartmentModal()">部门选择：前厅</button>
        <button class="btn btn-outline-mars" id="employee-manage-btn" onclick="openEmployeeManageModal()">员工管理</button>
        <button class="btn btn-outline-mars" id="history-btn" onclick="openHistoryModal()">历史记录</button>
        <button class="btn btn-mars" id="show-summary-btn">统计汇总</button>
    </div>
    <!-- 员工列表 - 固定尺寸卡片，两列布局 -->
    <div class="d-flex flex-wrap gap-2 mb-4" style="justify-content: space-between;" id="employee-list">
        <div class="text-center" style="font-size:16px;padding:40px 20px;color:var(--text-muted);width: 100%;">
            <div style="font-size:48px;margin-bottom:16px;">🌱</div>
            暂无员工，请点击「员工管理」添加
        </div>
    </div>
    <div class="mb-4" style="padding: 0 8px;">
        <label class="form-label">📝 当日机会点</label>
        <textarea class="form-control" id="today-problem" rows="2" placeholder="请输入当日机会点..." style="resize: none; overflow-y: auto; height: 80px;"></textarea>
    </div>
    <div class="summary-box d-none" id="summary-area">
        <div id="summary-content" style="font-size:16px;"></div>
        <button class="btn btn-mars copy-btn" id="copy-summary-btn">📋 一键复制汇总内容</button>
    </div>
</div>
<!-- 成功弹窗 -->
<div id="success-alert">发放成功</div>
<!-- 部门选择弹窗 -->
<div class="modal fade" id="department-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title">选择部门</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-grid gap-3 mb-4">
                    <button class="btn btn-mars" data-department="前厅">前厅</button>
                    <button class="btn btn-mars" data-department="后厨">后厨</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-mars" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="coin-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title" id="modal-name">发放激励币</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex gap-1 mb-4" style="flex-shrink: 0;">
                    <button class="btn coin-btn active flex-fill" data-val="1" style="font-size: 14px; padding: 8px; min-width: 0;">1 张</button>
                    <button class="btn coin-btn flex-fill" data-val="2" style="font-size: 14px; padding: 8px; min-width: 0;">2 张</button>
                    <button class="btn coin-btn flex-fill" data-val="3" style="font-size: 14px; padding: 8px; min-width: 0;">3 张</button>
                    <button class="btn coin-btn flex-fill" data-val="4" style="font-size: 14px; padding: 8px; min-width: 0;">4 张</button>
                    <button class="btn coin-btn flex-fill" data-val="5" style="font-size: 14px; padding: 8px; min-width: 0;">5 张</button>
                </div>
                <div class="mb-4">
                    <button class="btn coin-btn w-100" data-val="5" data-super="true" style="background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);color: white;border-color: #FFD700;">超级加倍卡（5张）</button>
                </div>
                <div class="mb-4">
                    <label class="form-label" id="quantity-label">自定义数量</label>
                    <input type="number" class="form-control" id="custom-coin" min="0" value="1" style="font-size:18px;">
                </div>
                <div>
                    <label class="form-label">发放原因（自动填入表扬）</label>
                    <textarea class="form-control" id="coin-reason" rows="2" style="font-size:16px; resize: none; overflow-y: auto; height: 80px;" placeholder="请输入发放原因..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-mars" id="submit-coin" style="font-size:16px;padding:10px 24px;">确认发放</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="employee-manage-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title">员工管理</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="month-total-box">
                    <div style="font-size:16px;font-weight:700;color:var(--text-dark);margin-bottom:10px;">
                        <span id="department-month-label">前厅</span>当月激励币数量：
                    </div>
                    <div style="display: flex; align-items: center;">
                        <input type="number" id="global-month-total" min="0" value="0" style="width:100px;text-align:center;border-radius:8px;">
                        <span style="margin-left: 4px;">张</span>
                        <button class="btn btn-sm btn-mars" id="confirm-month-total" style="padding:4px 12px;font-size:14px;margin-left:4px;">确定</button>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">➕ 添加新员工</label>
                    <div class="d-flex gap-2">
                        <input type="text" class="form-control" id="new-employee-name" placeholder="输入员工姓名" style="font-size:16px;">
                        <button class="btn btn-mars" id="add-employee" style="font-size:16px; padding: 8px 16px; min-width: 80px; text-align: center; display: flex; align-items: center; justify-content: center;">添加</button>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center pb-3 border-bottom" style="border-color:var(--mars-green-light)!important;">
                    <span style="flex:0 0 50%;font-weight:700;font-size:15px;color:var(--text-dark);">员工姓名</span>
                    <span style="flex:0 0 50%;font-weight:700;font-size:15px;text-align:right;color:var(--text-dark);">操作</span>
                </div>
                <div id="manage-employee-list">
                    <p class="text-center" style="font-size:15px;padding:30px 0;color:var(--text-muted);">暂无员工</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-mars" data-bs-dismiss="modal" style="font-size:16px;">关闭</button>
            </div>
        </div>
    </div>
</div>
<!-- 历史记录弹窗 -->
<div class="modal fade" id="history-modal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="flex-direction: column; align-items: center; padding: 16px 20px; position: relative;">
                <button type="button" class="btn-close" data-bs-dismiss="modal" style="position: absolute; top: 10px; right: 10px; filter: brightness(0) invert(1); opacity: 0.8;"></button>
                <h6 class="modal-title mb-4">历史记录</h6>
                <div class="d-flex justify-content-between align-items-center w-100">
                    <button type="button" class="btn" style="background: linear-gradient(135deg, #1E88E5 0%, #1565C0 100%); color: white; border: none; font-weight: 600; border-radius: 8px; padding: 8px 10px; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60px; width: 60px;" id="clear-history-btn">
                        <span>清空</span>
                        <span>记录</span>
                    </button>
                    <div class="d-flex gap-2">
                        <div style="position: relative;">
                            <input type="date" id="history-date" class="form-control" style="width: 150px; font-size: 14px; padding: 6px 10px; padding-right: 24px;">
                            <span style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: var(--mars-green); font-size: 14px; cursor: pointer;" onclick="document.getElementById('history-date').click();">📅</span>
                        </div>
                        <button type="button" class="btn btn-sm" style="background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%); color: white; border: none; font-weight: 600; border-radius: 8px; padding: 6px 12px;" id="reissue-btn">补发</button>
                    </div>
                </div>
            </div>
            <div class="modal-body">
                <div id="history-content" style="font-size:16px;line-height:1.6;"></div>
                <button class="btn btn-mars copy-btn" id="copy-history-btn" style="margin-top: 20px; width: 100%; font-size: 17px; padding: 14px; font-weight: 700;">📋 一键复制历史记录</button>
            </div>
            <div class="modal-footer">
            </div>
        </div>
    </div>
</div>
<!-- 补发激励币弹窗 -->
<div class="modal fade" id="reissue-modal" tabindex="-1">
    <div class="modal-dialog" style="max-width: 400px; width: 100%;">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title" id="reissue-modal-title">补发激励币</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-4">
                    <label class="form-label">补发日期</label>
                    <div style="position: relative;">
                        <input type="date" id="reissue-date" class="form-control" style="width: 100%; font-size: 14px; padding: 10px 14px; padding-right: 30px;">
                        <span style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--mars-green); font-size: 14px; cursor: pointer;" onclick="document.getElementById('reissue-date').click();">📅</span>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">选择员工</label>
                    <div id="reissue-employee-list" style="max-height: 160px; overflow-y: auto; padding: 4px; border: 1px solid #E0EDE6; border-radius: 8px; background: #F8FFF8; padding-right: 20px; width: 100%; box-sizing: border-box;">
                        <div style="display: flex; flex-wrap: wrap; gap: 4px; width: 100%;">
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-1 mb-4" style="flex-shrink: 0;">
                    <button class="btn coin-btn active flex-fill" data-val="1" style="font-size: 14px; padding: 8px; min-width: 0;">1 张</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// 初始化数据
let currentDepartment = localStorage.getItem('currentDepartment') || '前厅';
// 为每个部门存储独立的员工数据
let employeeData = JSON.parse(localStorage.getItem(`employeeData_${currentDepartment}`)) || [];
// 确保每个员工都有superCoin、dailyRecords和praiseRecords字段
employeeData.forEach(item => {
    if (!item.hasOwnProperty('superCoin')) {
        item.superCoin = 0;
    }
    if (!item.hasOwnProperty('dailyRecords')) {
        item.dailyRecords = {};
    }
    if (!item.hasOwnProperty('superCoinRecords')) {
        item.superCoinRecords = {};
    }
    if (!item.hasOwnProperty('praiseRecords')) {
        item.praiseRecords = [];
    }
});
let currentEditIndex = -1;
let globalMonthTotal = parseInt(localStorage.getItem(`globalMonthTotal_${currentDepartment}`)) || 0;
// 门店名称
let storeName = localStorage.getItem('storeName') || '流津时代';
document.getElementById('store-name-input').value = storeName;
const today = new Date();
const todayStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
const todayDateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
const todayDate = today.getDate();
const todayMonth = today.getMonth();
const todayYear = today.getFullYear();
let currentHalfMonth = todayDate <=15 ? '上半月' : '下半月';

// 加载当天的机会点内容
const todayProblemKey = `todayProblem_${currentDepartment}`;
const savedTodayProblem = localStorage.getItem(todayProblemKey);
if (savedTodayProblem) {
    document.getElementById('today-problem').value = savedTodayProblem;
}

// 监听机会点输入框的变化，实时保存到localStorage中
document.getElementById('today-problem').addEventListener('input', function() {
    const todayProblem = this.value.trim();
    const todayProblemKey = `todayProblem_${currentDepartment}`;
    localStorage.setItem(todayProblemKey, todayProblem);
});
// 更新门店名称
document.getElementById('store-name-input').addEventListener('input', function() {
    storeName = this.value.trim();
    localStorage.setItem('storeName', storeName);
});
// 每日自动重置当日数量
function checkDailyReset() {
    const lastDailyReset = localStorage.getItem(`lastDailyReset_${currentDepartment}`);
    
    if (lastDailyReset !== todayDateStr) {
        // 保存当天的历史记录，确保表扬内容和机会点被记录
        // 这里使用 lastDailyReset 作为日期，因为今天还没有开始，lastDailyReset 就是昨天的日期
        if (lastDailyReset) {
            // 临时保存当天的机会点内容
            const todayProblem = document.getElementById('today-problem').value.trim();
            // 保存昨天的历史记录，确保表扬内容和机会点被记录
            saveHistoryRecord(lastDailyReset, todayProblem);
        }
        
        // 重置当日数量
        employeeData.forEach(item => {
            item.today = 0;
            item.reason = '';
            // 重置表扬记录，确保不会带入到第二天
            item.praiseRecords = [];
        });
        
        // 重置机会点输入框
        document.getElementById('today-problem').value = '';
        // 重置localStorage中的机会点内容
        const todayProblemKey = `todayProblem_${currentDepartment}`;
        localStorage.removeItem(todayProblemKey);
        
        localStorage.setItem(`lastDailyReset_${currentDepartment}`, todayDateStr);
        saveData();
    }
}
// 每月重置逻辑：只要进入新月份就重置，不管是否是1号打开页面
function checkMonthlyReset() {
    const lastReset = localStorage.getItem(`lastMonthlyReset_${currentDepartment}`);
    const lastResetDate = lastReset ? new Date(lastReset) : null;
    
    // 如果没有重置记录，或者重置记录的月份不是当前月份，就重置
    if (!lastResetDate || lastResetDate.getMonth() !== todayMonth) {
        // 重置员工的月度数据，但保留已离职的员工
        employeeData.forEach(item => {
            // 只重置未离职员工的月度数据
            if (!item.isResigned) {
                item.today = 0;
                item.monthTotal = 0;
                item.superCoin = 0;
                item.reason = '';
                item.praiseRecords = [];
                item.dailyRecords = {};
                item.superCoinRecords = {};
            }
        });
        // 重置每日统计数据
        localStorage.setItem(`dailyStats_${currentDepartment}`, JSON.stringify({}));
        localStorage.setItem(`lastMonthlyReset_${currentDepartment}`, today.toISOString());
        saveData();
    }
}
// 设置凌晨自动重置定时器
function setMidnightResetTimer() {
    const now = new Date();
    const nextDay = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
    const timeToMidnight = nextDay - now;
    
    setTimeout(() => {
        checkDailyReset();
        setMidnightResetTimer();
    }, timeToMidnight);
}
// 月度上下半月统计逻辑：基于员工的dailyRecords计算
function calcMonthHalfTotal() {
    let firstHalfTotal = 0;
    let secondHalfTotal = 0;
    let monthTotal = 0;
    const currentMonthStr = `${todayYear}-${String(todayMonth+1).padStart(2, '0')}`;
    
    // 遍历所有员工的dailyRecords，计算上下半月的总数量
    // 包括已删除的员工，确保1-15号的记录被统计
    employeeData.forEach(item => {
        if (item.dailyRecords) {
            for (const dateStr in item.dailyRecords) {
                // 检查日期是否是当月的
                if (dateStr.startsWith(currentMonthStr)) {
                    const date = new Date(dateStr);
                    const day = date.getDate();
                    const amount = item.dailyRecords[dateStr];
                    monthTotal += amount;
                    if (day <= 15) {
                        firstHalfTotal += amount;
                    } else {
                        secondHalfTotal += amount;
                    }
                }
            }
        }
    });
    
    return { firstHalfTotal, secondHalfTotal, monthTotal };
}
// 清理旧历史记录，只保留最近六个月
function cleanupOldHistory() {
    const historyData = JSON.parse(localStorage.getItem(`historyData_${currentDepartment}`)) || {};
    const sixMonthsAgo = new Date();
    sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
    
    for (const dateStr in historyData) {
        const recordDate = new Date(dateStr);
        if (recordDate < sixMonthsAgo) {
            delete historyData[dateStr];
        }
    }
    
    localStorage.setItem(`historyData_${currentDepartment}`, JSON.stringify(historyData));
}
// 保存历史记录
function saveHistoryRecord(dateStr, problem = null) {
    // 清理旧历史记录
    cleanupOldHistory();
    
    // 基于传入的日期字符串创建日期对象
    const recordDate = new Date(dateStr);
    const recordYear = recordDate.getFullYear();
    const recordMonth = recordDate.getMonth();
    const recordDay = recordDate.getDate();
    
    // 完全基于员工的dailyRecords重新计算该日期所在月份的上下半月数据（只统计到该日期为止）
    let firstHalfTotal = 0;
    let secondHalfTotal = 0;
    let monthTotal = 0;
    const currentMonthStr = `${recordYear}-${String(recordMonth+1).padStart(2, '0')}`;
    
    // 遍历所有员工的dailyRecords，只统计到recordDate为止
    employeeData.forEach(item => {
        if (item.dailyRecords) {
            for (const recDateStr in item.dailyRecords) {
                const recDate = new Date(recDateStr);
                const sameMonth = recDate.getFullYear() === recordYear && recDate.getMonth() === recordMonth;
                const day = recDate.getDate();
                if (sameMonth && day <= recordDay) {
                    const amount = item.dailyRecords[recDateStr];
                    monthTotal += amount;
                    if (day <= 15) {
                        firstHalfTotal += amount;
                    } else {
                        secondHalfTotal += amount;
                    }
                }
            }
        }
    });
    
    // 获取机会点内容：如果传入了problem参数，使用传入的内容；否则，只有当记录日期是今天时，才使用当前的机会点内容
    const prob = problem !== null ? problem : (dateStr === todayDateStr ? document.getElementById('today-problem').value.trim() : '');
    
    // 确保机会点内容被保存到历史记录中
    if (dateStr === todayDateStr) {
        // 保存当天的机会点内容到localStorage
        localStorage.setItem(`todayProblem_${currentDepartment}`, prob);
    }
    
    // 从localStorage中获取所有员工数据，包括已删除的员工
    const allEmployees = JSON.parse(localStorage.getItem(`employeeData_${currentDepartment}`)) || [];
    console.log('All employees from localStorage:', allEmployees);
    
    // 创建员工在记录日期的发放数据数组
    const employeesWithRecordData = allEmployees.map(item => {
        // 获取该员工在记录日期的发放数量
        const recordDayCount = item.dailyRecords && item.dailyRecords[dateStr] ? item.dailyRecords[dateStr] : 0;
        return {
            ...item,
            recordDayCount: recordDayCount
        };
    });
    
    console.log('employeesWithRecordData:', employeesWithRecordData);
    
    // 计算记录日期的总发放数量
    const td = employeesWithRecordData.reduce((sum, item) => sum + item.recordDayCount, 0);
    // 计算到记录日期为止的超级加倍卡总数量
    const totalSuperCoins = employeeData.reduce((sum, item) => {
        let itemSuperCoins = 0;
        if (item.superCoinRecords) {
            for (const recDateStr in item.superCoinRecords) {
                const recDate = new Date(recDateStr);
                const sameMonth = recDate.getFullYear() === recordYear && recDate.getMonth() === recordMonth;
                const day = recDate.getDate();
                if (sameMonth && day <= recordDay) {
                    itemSuperCoins += item.superCoinRecords[recDateStr];
                }
            }
        }
        return sum + itemSuperCoins;
    }, 0);
    
    let summaryText = `${storeName}店 ${currentDepartment} 激励币汇总统计\n`;
    summaryText += `日期：${dateStr}\n`;
    
    let sortedEmployees = [];
    let filteredEmployees = [];
    
    if (employeeData.length) {
        // 过滤员工：
        // 1. 对于未删除的员工（包括在职和离职），显示所有员工，不管当月是否有发放记录
        // 2. 对于已删除的员工，只要当月有发放记录，就保留
        filteredEmployees = employeesWithRecordData.filter(it => {
            // 首先检查员工是否已删除
            if (it.isDeleted) {
                // 如果员工已删除，检查是否当月有发放记录
                if (it.dailyRecords) {
                    for (const recDateStr in it.dailyRecords) {
                        const recDate = new Date(recDateStr);
                        const sameMonth = recDate.getFullYear() === recordYear && recDate.getMonth() === recordMonth;
                        if (sameMonth) {
                            return true;
                        }
                    }
                }
                // 已删除且当月无发放记录，不保留
                return false;
            } else {
                // 未删除的员工，直接保留
                return true;
            }
        });
        
        // 确保已删除但当月有发放记录的员工能够显示
        console.log('Filtered employees after filter:', filteredEmployees);
        
        console.log('filteredEmployees:', filteredEmployees);
        console.log('filteredEmployees length:', filteredEmployees.length);
        
        // 按记录日期的发放数量排序
        sortedEmployees = [...filteredEmployees].sort((a,b) => b.recordDayCount - a.recordDayCount);
        
        filteredEmployees.forEach(it=>{
            // 计算该员工到记录日期为止的累计
            let itemTotal = 0;
            if (it.dailyRecords) {
                for (const recDateStr in it.dailyRecords) {
                    const recDate = new Date(recDateStr);
                    const sameMonth = recDate.getFullYear() === recordYear && recDate.getMonth() === recordMonth;
                    const day = recDate.getDate();
                    if (sameMonth && day <= recordDay) {
                        itemTotal += it.dailyRecords[recDateStr];
                    }
                }
            }
            // 判断是否是记录日期当天，如果是且有发放，显示数量，否则显示休班/离职
            let todayDisplay;
            if (it.isResigned) {
                todayDisplay = '离职';
            } else {
                // 检查该员工在记录日期是否有发放
                const hasRecordToday = it.recordDayCount > 0;
                todayDisplay = hasRecordToday ? `${it.recordDayCount}张` : '休班';
            }
            summaryText += `${it.name}：${todayDisplay} 月累计：${itemTotal}张\n`;
            // 计算该员工到记录日期为止的超级加倍卡数量
            let itemSuperCoins = 0;
            if (it.superCoinRecords) {
                for (const recDateStr in it.superCoinRecords) {
                    const recDate = new Date(recDateStr);
                    const sameMonth = recDate.getFullYear() === recordYear && recDate.getMonth() === recordMonth;
                    const day = recDate.getDate();
                    if (sameMonth && day <= recordDay) {
                        itemSuperCoins += it.superCoinRecords[recDateStr];
                    }
                }
            }
            if (itemSuperCoins > 0) {
                summaryText += `（超级加倍卡${itemSuperCoins}张）\n`;
            }
        });
    } else {
        summaryText += '暂无员工数据\n';
        // 当无员工数据时，确保 sortedEmployees 为空数组
        sortedEmployees = [];
        filteredEmployees = [];
    }
    
    if (sortedEmployees && sortedEmployees.length > 0) {
        const hasTodayCoin = sortedEmployees.some(item => item.recordDayCount > 0);
        // 计算当日实际收到激励卡的员工数量
        const activeEmployeesCount = sortedEmployees.filter(item => item.recordDayCount > 0).length;
        if (!hasTodayCoin) {
            summaryText += `🥇 当日第一名：无\n`;
            // 只有当当日收到激励卡的员工数量大于等于7时，才显示第二名
            if (activeEmployeesCount >= 7) {
                summaryText += `🥈 当日第二名：无\n`;
            }
        } else {
            const maxCount = sortedEmployees[0].recordDayCount;
            const topEmployees = sortedEmployees.filter(emp => emp.recordDayCount === maxCount);
            if (topEmployees.length > 1) {
                const names = topEmployees.map(emp => emp.name).join('、');
                summaryText += `🥇 当日第一名：${names}（${maxCount}张）\n`;
            } else {
                summaryText += `🥇 当日第一名：${topEmployees[0].name}（${maxCount}张）\n`;
                // 只有当当日收到激励卡的员工数量大于等于7时，才显示第二名
                if (activeEmployeesCount >= 7) {
                    const secondEmployees = sortedEmployees.filter(emp => emp.recordDayCount < maxCount);
                    if (secondEmployees.length > 0) {
                        const secondCount = secondEmployees[0].recordDayCount;
                        const secondGroup = secondEmployees.filter(emp => emp.recordDayCount === secondCount);
                        if (secondGroup.length > 1) {
                            const names = secondGroup.map(emp => emp.name).join('、');
                            summaryText += `🥈 当日第二名：${names}（${secondCount}张）\n`;
                        } else {
                            summaryText += `🥈 当日第二名：${secondGroup[0].name}（${secondCount}张）\n`;
                        }
                    } else {
                        summaryText += `🥈 当日第二名：无\n`;
                    }
                }
            }
        }
        
        // 显示指定日期有表扬记录的员工，汇总展示同一人的所有表扬内容
        const employeesWithPraise = employeeData.filter(item => {
            return item.praiseRecords && item.praiseRecords.some(record => record.date === dateStr);
        });
        if (employeesWithPraise.length > 0) {
            employeesWithPraise.forEach(item => {
                summaryText += `👏 表扬：${item.name}\n`;
                // 将同一人的指定日期的所有表扬内容用两个空格隔开，不换行
                const praiseReasons = item.praiseRecords
                    .filter(record => record.date === dateStr)
                    .map(record => record.reason)
                    .join('  ');
                summaryText += `${praiseReasons}\n`;
            });
        }
    }
    
    summaryText += `⚠️ 机会点：${prob||'无'}\n`;
    summaryText += `🎯 ${currentDepartment}当月激励币数量：${globalMonthTotal}张\n`;
    summaryText += `📊 当月发放总数量：${monthTotal}张\n`;
    summaryText += `🌗 上半月：${firstHalfTotal}张\n`;
    summaryText += `🌕 下半月：${secondHalfTotal}张\n`;
    summaryText += `✨ 超级加倍卡：${totalSuperCoins}张`;
    
    const historyData = JSON.parse(localStorage.getItem(`historyData_${currentDepartment}`)) || {};
    historyData[dateStr] = summaryText;
    localStorage.setItem(`historyData_${currentDepartment}`, JSON.stringify(historyData));
}
// 显示历史记录
function showHistoryRecord(dateStr) {
    const historyData = JSON.parse(localStorage.getItem(`historyData_${currentDepartment}`)) || {};
    let record = historyData[dateStr];
    
    // 只有当天的记录会重新生成，过去的日期如果没有记录则显示"无当日记录"
    if (!record && dateStr === todayDateStr) {
        // 对于今天的记录，传入当天的机会点内容
        const todayProblem = document.getElementById('today-problem').value.trim();
        saveHistoryRecord(dateStr, todayProblem);
        // 重新从localStorage中读取历史记录
        const updatedHistoryData = JSON.parse(localStorage.getItem(`historyData_${currentDepartment}`)) || {};
        record = updatedHistoryData[dateStr];
    }
    
    if (record) {
        document.getElementById('history-content').innerHTML = `<p style="margin-bottom:0;color:var(--text-dark);line-height:1.2;white-space:pre-wrap;">${record}</p>`;
    } else {
        document.getElementById('history-content').innerHTML = '<p class="text-center" style="font-size:16px;padding:40px 20px;color:var(--text-muted);">无当日记录</p>';
    }
}

function setMidnightRecordTimer() {

    setTimeout(() => {
        // 记录当天的历史数据
        const currentDateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

// 通用的自定义确认弹窗函数
function showCustomConfirm(title, message, onConfirm) {
    const dialog = document.createElement('div');
    dialog.style.position = 'fixed';
    dialog.style.top = '0';
    dialog.style.left = '0';

// 通用的成功提示悬浮提示（Toast）函数 - 使用和发放激励币成功一样的样式
function showSuccessAlert(message) {
    const toast = document.createElement('div');
    toast.style.position = 'fixed';
    toast.style.top = '100px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.background = 'linear-gradient(135deg, var(--mars-green) 0%, var(--mars-green-dark) 100%)';
    toast.style.color = 'white';
    toast.style.padding = '20px 36px';
    toast.style.borderRadius = '16px';
    toast.style.boxShadow = '0 8px 24px rgba(0,158,96,0.4)';
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s ease';
    toast.style.zIndex = '1060';
    toast.style.fontWeight = '700';
    toast.style.fontSize = '20px';
    toast.style.backdropFilter = 'blur(8px)';
    toast.style.minWidth = '200px';
    toast.style.textAlign = 'center';
    
    toast.textContent = message;
    
    document.body.appendChild(toast);
    
    // 显示动画
    setTimeout(() => {
        toast.style.opacity = '1';
    }, 10);
    
    // 0.8秒后自动消失
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => {
            if (toast.parentNode) {
                document.body.removeChild(toast);
            }
        }, 300);
    }, 800);
}

// 页面加载时为所有模态框添加关闭事件处理
window.addEventListener('DOMContentLoaded', function() {
    // 页面加载时清理可能遗留的modal-open类和backdrop
    document.body.classList.remove('modal-open');
    document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
        backdrop.remove();
    });
    
    const modals = document.querySelectorAll('.modal');
    modals.forEach(modal => {
        modal.addEventListener('hidden.bs.modal', function() {
            // 移除所有模态框的backdrop
            document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
                backdrop.remove();
            });
            // 确保body元素没有modal-open类
            document.body.classList.remove('modal-open');
            // 确保页面可以滚动
            document.body.style.overflow = '';
        });
    });
    
    // 历史记录日期输入变化事件
    document.getElementById('history-date').addEventListener('change', () => {
        const date = document.getElementById('history-date').value;
        if (date) {
            showHistoryRecord(date);
        }
    });
    
    // 当日机会点输入变化事件，自动更新历史记录
    document.getElementById('today-problem').addEventListener('input', () => {
        // 关闭统计汇总明细

        saveHistoryRecord(todayDateStr, todayProblem);
    });

    document.getElementById('copy-history-btn').addEventListener('click',()=>{

                `;
                list.appendChild(card);
            }
        });

}

// 确认删除离职员工的函数
function confirmDeleteEmployee(index) {
    const employee = employeeData[index];
    const today = new Date();
    const todayDay = today.getDate();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    
    // 检查是否在当月16号到月底之间
    const isSecondHalf = todayDay >= 16;
    
    // 检查该员工在当月16号到当日是否有发放激励币的记录
    let hasSecondHalfRecords = false;
    let secondHalfCoins = 0;
    
    // 检查该员工在当月1号到15号是否有发放激励币的记录
    let hasFirstHalfRecords = false;
    
    if (employee.dailyRecords) {
        for (const dateStr in employee.dailyRecords) {
            const recordDate = new Date(dateStr);
            if (recordDate.getMonth() === currentMonth && recordDate.getFullYear() === currentYear) {
                const day = recordDate.getDate();
                if (day >= 16 && day <= todayDay) {
                    hasSecondHalfRecords = true;
                    secondHalfCoins += employee.dailyRecords[dateStr];
                } else if (day >= 1 && day <= 15) {
                    hasFirstHalfRecords = true;
                }
            }
        }
    }
    
    // 根据不同情况显示不同的确认弹窗
    if (isSecondHalf) {
        if (hasSecondHalfRecords) {
            if (hasFirstHalfRecords) {
                // 情况1：在16号到月底之间，该员工在上半月和下半月都有发放记录
                if (confirm('是否删除此员工并回收其16号-当日激励币，1-15号发放数据仍保存？')) {
                    // 回收16号到当日的激励币
                    recoverSecondHalfCoins(index);
                    // 标记员工为已删除状态，保留1-15号的发放记录
                    deleteEmployeeData(index);
                }
            } else {
                // 情况2：在16号到月底之间，该员工只在下半月有发放记录
                if (confirm('是否删除此员工并回收其激励币？')) {
                    // 回收所有激励币
                    recoverAllCoins(index);
                    // 标记员工为已删除状态
                    deleteEmployeeData(index);
                }
            }
        } else {
            // 情况3：在16号到月底之间，该员工没有发放记录
            if (confirm('是否删除此员工？')) {
                // 标记员工为已删除状态
                deleteEmployeeData(index);
            }
        }
    } else {
        // 情况4：在1号到15号之间，回收所有激励币
        if (confirm('是否删除此员工并回收其激励币？')) {
            // 回收所有激励币
            recoverAllCoins(index);
            // 标记员工为已删除状态
            deleteEmployeeData(index);
        }
    }
}

// 回收16号到当日的激励币
function recoverSecondHalfCoins(index) {
    const employee = employeeData[index];
    const today = new Date();
    const currentMonth = today.getMonth();
    const currentYear = today.getFullYear();
    const todayDay = today.getDate();
    const todayDateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(todayDay).padStart(2, '0')}`;
    
    let recoveredCoins = 0;
    let recoveredSuperCoins = 0;
    
    if (employee.dailyRecords) {
        for (const dateStr in employee.dailyRecords) {
            const recordDate = new Date(dateStr);
            if (recordDate.getMonth() === currentMonth && recordDate.getFullYear() === currentYear) {
                const day = recordDate.getDate();
                if (day >= 16 && day <= todayDay) {
                    recoveredCoins += employee.dailyRecords[dateStr];
                    delete employee.dailyRecords[dateStr];
                }
            }
        }
    }
    
    // 回收16号到当日的超级加倍卡
    if (employee.superCoinRecords) {
        for (const dateStr in employee.superCoinRecords) {
            const recordDate = new Date(dateStr);
            if (recordDate.getMonth() === currentMonth && recordDate.getFullYear() === currentYear) {
                const day = recordDate.getDate();
                if (day >= 16 && day <= todayDay) {
                    recoveredSuperCoins += employee.superCoinRecords[dateStr];
                    delete employee.superCoinRecords[dateStr];
                }
            }
        }
    }
    
    // 更新超级加倍卡数量
    employee.superCoin -= recoveredSuperCoins;
    
    // 删除当日的表扬记录
    if (employee.praiseRecords) {
        employee.praiseRecords = employee.praiseRecords.filter(record => record.date !== todayDateStr);
    }
    
    // 更新月度累计
    employee.monthTotal -= recoveredCoins;
    
    // 保存数据
    saveData();
    
    // 重新渲染
    renderEmployee();
    renderManageEmployeeList();
    
    // 显示成功提示
    let successMessage = `已回收${recoveredCoins}张激励币`;
    if (recoveredSuperCoins > 0) {
        successMessage += `和${recoveredSuperCoins}张超级加倍卡`;
    }
    const successAlert = document.getElementById('success-alert');
    successAlert.textContent = successMessage;
    successAlert.style.opacity = '1';
    setTimeout(() => {
        successAlert.style.opacity = '0';
    }, 800);
}

// 回收所有激励币
function recoverAllCoins(index) {
    const employee = employeeData[index];
    
    // 清空每日记录
    employee.dailyRecords = {};
    // 清空月度累计
    employee.monthTotal = 0;
    // 清空超级加倍卡记录
    employee.superCoin = 0;
    employee.superCoinRecords = {};
    // 清空表扬记录
    employee.praiseRecords = [];
    
    // 保存数据
    saveData();
    
    // 重新渲染
    renderEmployee();
    renderManageEmployeeList();
}

    const recordYear = today.getFullYear();
    const recordMonth = today.getMonth();
    const recordDay = today.getDate();
    
    // 使用纯文本格式构建汇总内容，避免HTML元素导致的空行
    let summaryText = `${storeName}店 ${currentDepartment} 激励币汇总统计\n`;
    summaryText += `日期：${todayStr}\n`;
    
    if (employeeData.length) {
        // 遍历所有员工，包括已删除的员工，确保1-15号的记录被统计
        employeeData.forEach(it=>{
            // 只显示未删除的员工，或者已删除但有1-15号发放记录的员工
            let showEmployee = false;
            if (!it.isDeleted) {
                showEmployee = true;
            } else if (it.isDeleted && it.dailyRecords) {
                // 检查已删除员工是否在1-15号有发放记录
                for (const recDateStr in it.dailyRecords) {
                    const recDate = new Date(recDateStr);
                    const sameMonth = recDate.getFullYear() === recordYear && recDate.getMonth() === recordMonth;
                    const day = recDate.getDate();
                    if (sameMonth && day >= 1 && day <= 15) {
                        showEmployee = true;
                        break;
                    }
                }
            }
            
            if (showEmployee) {
                if (it.isResigned || it.isDeleted) {
                    summaryText += `${it.name}：离职 月累计：${it.monthTotal}张\n`;
                    // 如果有超级加倍卡，在月度统计下方另起一行记录
                    if (it.superCoin > 0) {
                        summaryText += `（超级加倍卡${it.superCoin}张）\n`;
                    }
                } else {
                    const todayDisplay = it.today === 0 ? '休班' : `${it.today}张`;
                    summaryText += `${it.name}：${todayDisplay} 月累计：${it.monthTotal}张\n`;
                    // 如果有超级加倍卡，在月度统计下方另起一行记录
                    if (it.superCoin > 0) {
                        summaryText += `（超级加倍卡${it.superCoin}张）\n`;
                    }
                }
            }
        });
    } else {
        summaryText += '暂无员工数据\n';
    }
    // 处理当日排名
    if (sortedEmployees.length > 0) {
        // 过滤掉已删除的员工
        const activeEmployees = employeeData.filter(item => !item.isDeleted);
        const hasTodayCoin = activeEmployees.some(item => item.today > 0);
        // 计算当日实际收到激励卡的员工数量
        const activeEmployeesCount = activeEmployees.filter(item => item.today > 0).length;
        if (!hasTodayCoin) {
            summaryText += `🥇 当日第一名：无\n`;
            // 只有当当日收到激励卡的员工数量大于等于7时，才显示第二名
            if (activeEmployeesCount >= 7) {
                summaryText += `🥈 当日第二名：无\n`;
            }
        } else {
            // 过滤掉已删除的员工
            const filteredSortedEmployees = sortedEmployees.filter(item => !item.isDeleted);
            if (filteredSortedEmployees.length > 0) {
                const maxCount = filteredSortedEmployees[0].today;
                const topEmployees = filteredSortedEmployees.filter(emp => emp.today === maxCount);
                if (topEmployees.length > 1) {
                    // 并列第一名
                    const names = topEmployees.map(emp => emp.name).join('、');
                    summaryText += `🥇 当日第一名：${names}（${maxCount}张）\n`;
                } else {
                    summaryText += `🥇 当日第一名：${topEmployees[0].name}（${maxCount}张）\n`;
                    // 只有当当日收到激励卡的员工数量大于等于7时，才显示第二名
                    if (activeEmployeesCount >= 7) {
                        // 找第二名
                        const secondEmployees = filteredSortedEmployees.filter(emp => emp.today < maxCount);
                        if (secondEmployees.length > 0) {
                            const secondCount = secondEmployees[0].today;
                            const secondGroup = secondEmployees.filter(emp => emp.today === secondCount);
                            if (secondGroup.length > 1) {
                                const names = secondGroup.map(emp => emp.name).join('、');
                                summaryText += `🥈 当日第二名：${names}（${secondCount}张）\n`;
                            } else {
                                summaryText += `🥈 当日第二名：${secondGroup[0].name}（${secondCount}张）\n`;
                            }
                        } else {
                            summaryText += `🥈 当日第二名：无\n`;
                        }
                    }
                }
            }
        }
        
        // 显示当天有表扬记录的员工，汇总展示同一人的所有表扬内容
        const employeesWithPraise = employeeData.filter(item => {
            return item.praiseRecords && item.praiseRecords.some(record => record.date === todayDateStr);
        });
        if (employeesWithPraise.length > 0) {
            employeesWithPraise.forEach(item => {
                summaryText += `👏 表扬：${item.name}\n`;
                // 将同一人的当天的所有表扬内容用两个空格隔开，不换行
                const praiseReasons = item.praiseRecords
                    .filter(record => record.date === todayDateStr)
                    .map(record => record.reason)
                    .join('  ');
                summaryText += `${praiseReasons}\n`;
            });
        }
    }
    // 添加机会点
    summaryText += `⚠️ 机会点：${prob||'无'}\n`;
    // 统计数据
    summaryText += `🎯 ${currentDepartment}当月激励币数量：${globalMonthTotal}张\n`;
    summaryText += `📊 当月发放总数量：${monthTotal}张\n`;
    summaryText += `🌗 上半月：${firstHalfTotal}张\n`;
    summaryText += `🌕 下半月：${secondHalfTotal}张\n`;
    summaryText += `✨ 超级加倍卡：${totalSuperCoins}张`;
    // 创建带有样式的HTML，但使用纯文本内容
    let html = `<p style="margin-bottom:0;color:var(--text-dark);line-height:1.2;white-space:pre-wrap;">${summaryText}</p>`;
    document.getElementById('summary-content').innerHTML = html;
    document.getElementById('summary-area').classList.remove('d-none');
    document.getElementById('summary-area').scrollIntoView({behavior:'smooth'});
});
document.getElementById('copy-summary-btn').addEventListener('click',()=>{
    const content = document.getElementById('summary-content').innerText;
    navigator.clipboard.writeText(content).then(()=>{
        alert('✅ 已复制到剪贴板！');
    }).catch(err=>{
        console.error('复制失败：', err);
        alert('复制失败，请手动复制');
    });
});

// 关闭统计汇总明细
function closeSummary() {
    document.getElementById('summary-area').classList.add('d-none');
}
function saveData() {
    // 关闭统计汇总明细
    closeSummary();
    
    localStorage.setItem(`employeeData_${currentDepartment}`, JSON.stringify(employeeData));
    localStorage.setItem(`globalMonthTotal_${currentDepartment}`, globalMonthTotal);
    localStorage.setItem('currentDepartment', currentDepartment);
    
    // 每次保存数据后，自动更新当天的历史记录
    const todayProblem = document.getElementById('today-problem').value.trim();
    saveHistoryRecord(todayDateStr, todayProblem);
}
init();
</script>
